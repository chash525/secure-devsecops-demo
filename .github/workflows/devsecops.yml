name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-secure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Trivy
      run: |
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y

    - name: Run SAST Scan
      run: |
        trivy fs --security-checks vuln,config .

    - name: Install Dependency Scanner (pip-audit)
      run: |
        pip install pip-audit

    - name: Upgrade Flask to safe version
      run: |
        pip install --upgrade pip
        pip install --upgrade flask>=3.1.3
        pip install -r requirements.txt --upgrade-strategy eager
        pip show flask

    - name: Run pip-audit
      run: pip-audit

    - name: Build Docker Image
      run: |
        docker build -t devsecops-demo:latest .

    - name: Scan Container Image
      run: |
        trivy image devsecops-demo:latest

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Image
      run: |
        docker tag devsecops-demo:latest ${{ secrets.DOCKER_USERNAME }}/devsecops-demo:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-demo:latest
