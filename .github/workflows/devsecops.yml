name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-secure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Trivy
      run: |
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y

    - name: Run SAST Scan
      run: |
        trivy fs --security-checks vuln,config .

    - name: Upgrade vulnerable packages
      run: |
        pip install --upgrade pip
        pip install --upgrade flask>=3.1.3 jinja2>=3.1.6 requests>=2.32.4 setuptools>=78.1.1 twisted>=24.7.0rc1 urllib3>=2.6.3 wheel>=0.46.2 cryptography>=46.0.5 certifi>=2024.7.4 configobj>=5.0.9 idna>=3.7

    - name: Install Dependency Scanner (pip-audit)
      run: |
        pip install pip-audit

    - name: Upgrade Flask to safe version
      run: |
        python -m pip install --upgrade pip
        # Force upgrade Flask to 3.1.3 ignoring any constraints
        python -m pip install --force-reinstall --upgrade flask>=3.1.3
        python -m pip show flask

    - name: Pip Audit
      run: |
        pip-audit

    - name: Build Docker Image
      run: |
        docker build -t devsecops-demo:latest .

    - name: Scan Container Image
      run: |
        trivy image devsecops-demo:latest

    - name: Lint Dockerfile
      uses: hadolint/hadolint-action
      with:
        dockerfile: ./Dockerfile

    - name: Run Policy Check
      run: |
        conftest test Dockerfile --policy ./policies/

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Image
      run: |
        docker tag devsecops-demo:latest ${{ secrets.DOCKER_USERNAME }}/devsecops-demo:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-demo:latest
